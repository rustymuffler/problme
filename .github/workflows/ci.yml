name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**', 'content/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  links:
    name: Link checker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lychee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download lychee-v0.24.2 \
            --repo lycheeverse/lychee \
            --pattern "lychee-x86_64-unknown-linux-musl.tar.gz" \
            --output /tmp/lychee.tar.gz
          tar xzf /tmp/lychee.tar.gz -C /tmp
          sudo mv /tmp/lychee /usr/local/bin/

      - name: Check links
        run: lychee --config .lychee.toml dist/**/*.html
